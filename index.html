<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiQuest | The Encyclopedia Crawler</title>
    <!-- 
        WIKIQUEST : SYSTEME DE JEU PROCEDURAL 
        Ce projet transforme Wikipedia en un moteur de Donjons & Dragons.
        Technologies : Vanilla JS, MediaWiki API, Hugging Face AI API.
    -->
    <style>
        /* ==========================================================================
           DESIGN SYSTEM : TERMINAL RETRO CRT
           ========================================================================== */
        :root {
            --term-green: #33ff33;
            --term-bg: #0d0d0d;
            --term-glow: 0 0 10px rgba(51, 255, 51, 0.4);
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--term-bg);
            color: var(--term-green);
            font-family: var(--font-main);
            margin: 0;
            padding: 20px;
            overflow: hidden; /* Empêche le scroll du body pour l'effet terminal */
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Effet de balayage Scanline */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #game-container {
            border: 1px solid var(--term-green);
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            box-shadow: var(--term-glow);
            margin-bottom: 20px;
            position: relative;
        }

        .output-line {
            margin-bottom: 8px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-out;
        }

        .system-msg { color: #888; font-style: italic; }
        .location-msg { color: #fff; font-weight: bold; text-decoration: underline; }
        .entity-msg { color: #ffcc00; }
        .ai-msg { color: #00ccff; }

        #input-area {
            display: flex;
            border: 1px solid var(--term-green);
            padding: 10px;
            background: rgba(51, 255, 51, 0.05);
        }

        #prompt-symbol { margin-right: 10px; font-weight: bold; }

        input#user-input {
            background: transparent;
            border: none;
            color: var(--term-green);
            font-family: var(--font-main);
            font-size: 1.1rem;
            flex-grow: 1;
            outline: none;
            text-shadow: var(--term-glow);
        }

        /* Barre de stats */
        #stats-bar {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--term-green);
            padding-bottom: 10px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Masquage de la scrollbar pour esthétique terminal */
        #game-container::-webkit-scrollbar { width: 6px; }
        #game-container::-webkit-scrollbar-thumb { background: var(--term-green); }
    </style>
</head>
<body>

    <div id="stats-bar">
        <span>PLAYER: ADVENTURER</span>
        <span>HP: <span id="hp-val">100</span></span>
        <span>INT: <span id="int-val">10</span></span>
        <span>LORE: <span id="lore-title">NULL</span></span>
    </div>

    <div id="game-container">
        <div class="output-line system-msg">WIKIQUEST OS v1.0.4 - INITIALISATION...</div>
        <div class="output-line">Bienvenue. Entrez un sujet de connaissance pour générer votre quête (ex: "Samouraï", "Mars", "Léonard de Vinci").</div>
    </div>

    <div id="input-area">
        <span id="prompt-symbol">></span>
        <input type="text" id="user-input" placeholder="Entrez un sujet ou une commande..." autofocus autocomplete="off">
    </div>

    <script>
        /* ==========================================================================
           LOGIQUE DU MOTEUR WIKIQUEST
           ========================================================================== */

        class WikiQuest {
            constructor() {
                this.container = document.getElementById('game-container');
                this.input = document.getElementById('user-input');
                this.hpDisplay = document.getElementById('hp-val');
                this.loreDisplay = document.getElementById('lore-title');
                
                this.state = {
                    phase: 'INIT', // INIT, EXPLORATION, DIALOGUE
                    worldData: null,
                    currentRoomIndex: 0,
                    inventory: [],
                    hp: 100,
                    hfToken: "" // Optionnel : Token Hugging Face
                };

                this.initListeners();
            }

            initListeners() {
                this.input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const val = this.input.value.trim();
                        this.handleInput(val);
                        this.input.value = '';
                    }
                });
            }

            /**
             * GESTIONNAIRE D'ENTREES UTILISATEUR
             */
            async handleInput(input) {
                if (!input) return;
                this.print(`> ${input}`, 'user-cmd');

                if (this.state.phase === 'INIT') {
                    await this.startStory(input);
                } else {
                    this.processGameCommand(input.toLowerCase());
                }
            }

            /**
             * ETAPE 1 : EXTRACTION DES DONNEES (WIKIPEDIA API)
             */
            async startStory(subject) {
                this.print("Extraction du savoir depuis la base de données universelle...", "system-msg");
                
                // Utilisation de l'API MediaWiki (format MobileView pour obtenir des sections découpées)
                const url = `https://fr.wikipedia.org/api/rest_v1/page/mobile-sections/${encodeURIComponent(subject)}`;
                
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("Sujet introuvable");
                    const data = await response.json();
                    
                    this.state.worldData = this.parseWikiSections(data);
                    this.state.phase = 'EXPLORATION';
                    this.loreDisplay.innerText = this.state.worldData.title.toUpperCase();
                    
                    this.print(`--- QUÊTE GÉNÉRÉE : ${this.state.worldData.title} ---`, "location-msg");
                    this.renderCurrentRoom();

                } catch (err) {
                    this.print(`ERREUR : Le sujet "${subject}" n'a pas pu être converti en réalité tangible.`, "system-msg");
                }
            }

            /**
             * ETAPE 2 : ANALYSE ET NLP SIMPLIFIE
             */
            parseWikiSections(data) {
                const sections = [];
                
                // On fusionne la section principale et les autres sections
                const allSections = [data.lead.sections[0], ...data.remaining.sections];
                
                allSections.forEach(s => {
                    if (s.text && s.text.length > 100) {
                        const cleanText = s.text.replace(/<[^>]*>/g, ''); // Nettoyage HTML
                        sections.push({
                            title: s.line || "Introduction",
                            content: cleanText.substring(0, 800) + "...",
                            entities: this.extractEntities(cleanText)
                        });
                    }
                });

                return {
                    title: data.lead.displaytitle,
                    rooms: sections
                };
            }

            /**
             * EXTRACTION D'ENTITÉS (Mini-NLP)
             */
            extractEntities(text) {
                // Recherche simplifiée de noms propres (Mots commençant par une majuscule au milieu d'une phrase)
                const nameRegex = /[A-Z][a-zà-ÿ]+ (?:[A-Z][a-zà-ÿ]+)*/g;
                const foundNames = text.match(nameRegex) || [];
                
                // On filtre les doublons et les mots communs
                const uniqueEntities = [...new Set(foundNames)].filter(n => n.length > 3).slice(0, 4);
                
                return {
                    characters: uniqueEntities,
                    objects: ["Relique de savoir", "Parchemin ancien"].sort(() => 0.5 - Math.random()).slice(0, 1)
                };
            }

            /**
             * ETAPE 3 : LOGIQUE DE JEU (COMMANDES)
             */
            processGameCommand(cmd) {
                const room = this.state.worldData.rooms[this.state.currentRoomIndex];

                if (cmd.includes("aller") || cmd.includes("nord") || cmd.includes("suivant")) {
                    this.moveRoom(1);
                } 
                else if (cmd.includes("parler") || cmd.includes("discuter")) {
                    const char = room.entities.characters[0] || "l'esprit du savoir";
                    this.interactWithAI(char, room.content);
                }
                else if (cmd.includes("examiner") || cmd.includes("regarder")) {
                    this.renderCurrentRoom();
                }
                else if (cmd.includes("aide")) {
                    this.print("Commandes : 'aller', 'parler', 'examiner', 'prendre'.", "system-msg");
                }
                else {
                    this.print("Action inconnue. Essayez 'aller' ou 'parler'.", "system-msg");
                }
            }

            moveRoom(direction) {
                this.state.currentRoomIndex += direction;
                if (this.state.currentRoomIndex >= this.state.worldData.rooms.length) {
                    this.print("Vous avez atteint la fin de cette connaissance. Bravo, explorateur.", "location-msg");
                    this.state.phase = 'INIT';
                } else {
                    this.renderCurrentRoom();
                }
            }

            renderCurrentRoom() {
                const room = this.state.worldData.rooms[this.state.currentRoomIndex];
                this.print(`[ ZONE : ${room.title} ]`, "location-msg");
                this.print(room.content);
                
                if (room.entities.characters.length > 0) {
                    this.print(`Personnage présent : ${room.entities.characters.join(', ')}`, "entity-msg");
                }
            }

            /**
             * ETAPE 4 : GENERATION DE DIALOGUE VIA HUGGING FACE
             */
            async interactWithAI(character, context) {
                this.print(`Vous approchez ${character}...`, "system-msg");
                
                if (!this.state.hfToken) {
                    this.print(`${character} vous regarde en silence. (Configurez un Token HF pour activer les dialogues IA)`, "ai-msg");
                    return;
                }

                const prompt = `Tu es ${character} dans un jeu de rôle. Basé sur ce texte : "${context.substring(0, 200)}", dis une phrase mystérieuse au voyageur.`;

                try {
                    const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.1", {
                        method: "POST",
                        headers: { 
                            "Authorization": `Bearer ${this.state.hfToken}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ inputs: prompt })
                    });
                    const result = await response.json();
                    const reply = result[0].generated_text || "Le savoir est trop dense pour être exprimé...";
                    this.print(`${character} : "${reply}"`, "ai-msg");
                } catch (e) {
                    this.print(`${character} semble perdu dans ses pensées.`, "ai-msg");
                }
            }

            /**
             * AFFICHAGE DANS LE TERMINAL
             */
            print(text, className = '') {
                const line = document.createElement('div');
                line.className = `output-line ${className}`;
                line.innerText = text;
                this.container.appendChild(line);
                this.container.scrollTop = this.container.scrollHeight;
            }
        }

        // LANCEMENT
        const Game = new WikiQuest();
    </script>
</body>
</html>
