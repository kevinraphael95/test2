<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>WIKIQUEST : ULTIMATE EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --neon-blue: #00d4ff; --neon-pink: #ff007a; --neon-green: #39ff14;
            --bg-dark: #020205; --panel-bg: rgba(10, 10, 20, 0.85);
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-dark); color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        /* CANVAS BACKGROUND */
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(1px); }

        /* HUD LAYOUT */
        #game-ui {
            display: grid; grid-template-columns: 350px 1fr; grid-template-rows: auto 1fr 100px;
            height: 100vh; padding: 20px; gap: 20px;
        }

        header {
            grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--neon-blue); padding-bottom: 10px;
            text-transform: uppercase; letter-spacing: 4px; font-family: 'Orbitron', sans-serif;
        }

        .panel {
            background: var(--panel-bg); border: 1px solid rgba(0, 212, 255, 0.3);
            backdrop-filter: blur(15px); border-radius: 4px; padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,212,255,0.05);
        }

        /* LOGS & STORY */
        #main-view { overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .log-entry { 
            padding: 10px; border-left: 3px solid var(--neon-blue); 
            background: rgba(255,255,255,0.02); animation: reveal 0.4s ease;
        }
        .combat-entry { border-left-color: var(--neon-pink); color: var(--neon-pink); font-weight: bold; }

        /* STATS */
        .stat-group { margin-bottom: 25px; }
        .label { font-size: 0.7rem; color: var(--neon-blue); font-weight: 900; margin-bottom: 5px; }
        .bar-outer { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .bar-inner { height: 100%; width: 100%; transition: width 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        
        /* INTERFACE */
        #input-container {
            grid-column: 1 / -1; display: flex; align-items: center; 
            border-top: 1px solid rgba(0, 212, 255, 0.5);
        }
        #cmd-input {
            width: 100%; background: transparent; border: none; color: white;
            font-size: 1.5rem; padding: 20px; outline: none; font-family: 'Orbitron';
        }

        .glitch { animation: glitch 0.2s infinite; }
        @keyframes reveal { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes glitch { 
            0% { transform: translate(0); } 
            20% { transform: translate(-2px, 2px); filter: hue-rotate(90deg); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div id="game-ui">
    <header>
        <div id="game-title">WikiQuest // Neo-Driver</div>
        <div id="world-tag">Localhost_Safe</div>
    </header>

    <aside class="panel">
        <div class="stat-group">
            <div class="label">INTÉGRITÉ SYSTÈME</div>
            <div id="hp-val" style="text-align: right; font-size: 0.8rem;">100%</div>
            <div class="bar-outer"><div id="hp-bar" class="bar-inner" style="background: var(--neon-pink);"></div></div>
        </div>
        <div class="stat-group">
            <div class="label">SYNCHRONISATION DATA</div>
            <div id="exp-val" style="text-align: right; font-size: 0.8rem;">0 / 100</div>
            <div class="bar-outer"><div id="exp-bar" class="bar-inner" style="background: var(--neon-blue); width: 0%;"></div></div>
        </div>
        <div class="label">MODULES RÉCUPÉRÉS</div>
        <div id="inventory-box" style="font-size: 0.8rem; margin-top: 10px; color: #888;">Néant...</div>
    </aside>

    <main class="panel" id="main-view">
        <div class="log-entry">
            <strong style="color: var(--neon-green);">[INITIALISATION]</strong><br>
            Entrez un concept Wikipedia pour générer une simulation de réalité.
        </div>
    </main>

    <div id="input-container">
        <span style="color: var(--neon-blue); font-size: 1.5rem; padding-left: 20px;">></span>
        <input type="text" id="cmd-input" placeholder="Sujet ou Action..." autofocus autocomplete="off">
    </div>
</div>

<script>
/**
 * WIKIQUEST ULTIMATE ENGINE
 * Totalement refondu pour un rendu visuel pro sur GitHub.
 */

// --- BACKGROUND ENGINE (PARTICLES) ---
const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize; resize();

class Particle {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.alpha = Math.random() * 0.5;
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if(this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
    }
    draw() {
        ctx.fillStyle = `rgba(0, 212, 255, ${this.alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}
for(let i=0; i<100; i++) particles.push(new Particle());

function animate() {
    ctx.clearRect(0,0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}
animate();

// --- GAME LOGIC ---
class Engine {
    constructor() {
        this.input = document.getElementById('cmd-input');
        this.view = document.getElementById('main-view');
        this.state = {
            hp: 100, exp: 0, level: 1,
            world: null, roomIdx: 0, 
            inv: [], inCombat: false
        };
        this.setupEvents();
    }

    setupEvents() {
        this.input.addEventListener('keypress', e => {
            if(e.key === 'Enter') {
                const val = this.input.value.trim();
                this.input.value = '';
                this.process(val);
            }
        });
    }

    print(msg, type = 'normal') {
        const div = document.createElement('div');
        div.className = `log-entry ${type === 'combat' ? 'combat-entry' : ''}`;
        div.innerHTML = msg;
        this.view.prepend(div); // Les nouveaux messages en haut pour l'effet "Terminal"
    }

    async process(cmd) {
        if(!this.state.world) {
            await this.initWorld(cmd);
            return;
        }

        const action = cmd.toLowerCase();
        if(action === 'v' || action === 'voyager') this.nextRoom();
        else if(action === 'f' || action === 'fouiller') this.loot();
        else if(action === 'a' || action === 'attaquer' && this.state.inCombat) this.combatStep();
        else this.print("Commandes valides : Voyager (v), Fouiller (f), Aide");
    }

    async initWorld(subject) {
        this.print(`<strong>Séquençage de "${subject}"...</strong>`);
        try {
            const res = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/mobile-sections/${encodeURIComponent(subject)}`);
            const data = await res.json();
            
            this.state.world = [data.lead.sections[0], ...data.remaining.sections].map(s => ({
                name: s.line || "Portail d'Entrée",
                desc: s.text.replace(/<[^>]*>/g, '').substring(0, 400)
            }));

            document.getElementById('world-tag').innerText = "REALITY_SYNC: " + subject.toUpperCase();
            this.nextRoom();
        } catch(e) {
            this.print("Échec de synchronisation. Le sujet n'existe pas dans la base Wiki.", "combat");
        }
    }

    nextRoom() {
        if(this.state.inCombat) { this.print("Impossible de fuir le combat actuel !"); return; }
        
        const room = this.state.world[this.state.roomIdx];
        this.print(`<br><strong style="color:var(--neon-blue)">>> SECTEUR : ${room.name}</strong>`);
        this.print(room.desc + "...");
        
        this.state.roomIdx = (this.state.roomIdx + 1) % this.state.world.length;
        this.state.exp += 20;
        this.updateUI();

        if(Math.random() > 0.7) this.startCombat();
    }

    startCombat() {
        this.state.inCombat = true;
        this.print("⚠️ <strong>DÉTECTION D'UNE ANOMALIE HOSTILE !</strong> Taper 'attaquer' (a) !", "combat");
        document.body.classList.add('glitch');
    }

    combatStep() {
        const win = Math.random() > 0.3;
        if(win) {
            this.print("Cible neutralisée. Data extraite.");
            this.state.inCombat = false;
            this.state.exp += 50;
            document.body.classList.remove('glitch');
        } else {
            const dmg = 15;
            this.state.hp -= dmg;
            this.print(`ERREUR : Le système a subi un choc ! -${dmg}% intégrité.`, "combat");
        }
        this.updateUI();
        if(this.state.hp <= 0) this.die();
    }

    loot() {
        const items = ["Buffer de RAM", "Overclock-Grip", "Data-Core"];
        const item = items[Math.floor(Math.random()*items.length)];
        this.state.inv.push(item);
        this.print(`Récupéré : <span style="color:var(--neon-green)">${item}</span>`);
        this.updateUI();
    }

    updateUI() {
        document.getElementById('hp-bar').style.width = this.state.hp + "%";
        document.getElementById('hp-val').innerText = this.state.hp + "%";
        
        const xpPercent = this.state.exp % 100;
        document.getElementById('exp-bar').style.width = xpPercent + "%";
        document.getElementById('exp-val').innerText = `${this.state.exp} / 1000`;
        
        document.getElementById('inventory-box').innerHTML = this.state.inv.map(i => `[${i}]`).join(' ');
    }

    die() {
        this.print("CRASH DU SYSTÈME. CONNEXION PERDUE.", "combat");
        setTimeout(() => location.reload(), 3000);
    }
}

const game = new Engine();
</script>
</body>
</html>
